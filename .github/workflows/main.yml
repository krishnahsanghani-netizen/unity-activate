  name: Unity Activation
  on:
    workflow_dispatch:
  jobs:
    activation:
      runs-on: ubuntu-latest
      steps:
        - uses: game-ci/unity-activate@v2
          id: activation
          with:
            unityVersion: 6000.3.0f1
          env:
            UNITY_EMAIL: ${{
  secrets.UNITY_EMAIL }}
            UNITY_PASSWORD: ${{
  secrets.UNITY_PASSWORD }}
        - run: |
            echo "License file path: ${{
  steps.activation.outputs.UNITY_LICENSE_
  FILE }}"
            ls -la ${{ steps.activation.o
  utputs.UNITY_LICENSE_FILE }} || echo
  "File not found at that path"
            find / -name "*.ulf"
  2>/dev/null | head -5
            find / -name "*.x2d"
  2>/dev/null | head -5
        - uses:
  actions/upload-artifact@v4
          if: always()
          with:
            name: unity-license
            path: |
              ${{ steps.activation.output
  s.UNITY_LICENSE_FILE }}
   
  /root/.local/share/unity3d/Unity/
              **/*.ulf
              **/*.x2d
            if-no-files-found: warn
