  name: Unity Activation
  on:
    workflow_dispatch:
  jobs:
    activation:
      runs-on: ubuntu-latest
      steps:
        - uses: game-ci/unity-activate@v2
          id: activation
          with:
            unityVersion: 6000.3.0f1
          env:
            UNITY_EMAIL: ${{
  secrets.UNITY_EMAIL }}
            UNITY_PASSWORD: ${{
  secrets.UNITY_PASSWORD }}
        - run: find / -name "*.ulf"
  2>/dev/null | head -10
        - uses:
  actions/upload-artifact@v4
          if: always()
          with:
            name: unity-license
            path: ${{ steps.activation.ou
  tputs.UNITY_LICENSE_FILE }}
            if-no-files-found: warn
